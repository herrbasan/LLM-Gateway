<section class="test-form">
    <header>
        <h2>Test Vision (Image Input)</h2>
        <p class="text-dim">Send images to vision-capable models through the gateway</p>
    </header>
    
    <form id="vision-form">
        <div class="form-group">
            <label for="model">Model</label>
            <nui-select id="model-select">
                <select id="model" name="model">
                    <option value="">Loading models...</option>
                </select>
            </nui-select>
        </div>

        <div class="form-group">
            <label>Image Source</label>
            <div class="image-source-tabs">
                <nui-button type="primary" id="tab-upload" class="tab-active">
                    <button type="button">Upload File</button>
                </nui-button>
                <nui-button type="secondary" id="tab-url">
                    <button type="button">Remote URL</button>
                </nui-button>
            </div>
        </div>
        
        <div class="form-group" id="upload-section">
            <label for="image-file">Select Image</label>
            <div class="file-input-wrapper">
                <nui-button type="secondary">
                    <button type="button" id="file-select-btn">Choose File</button>
                </nui-button>
                <span class="file-name" id="file-name">No file selected</span>
                <input type="file" id="image-file" name="image-file" accept="image/*" hidden>
            </div>
            <small class="text-dim">Max 20MB. Supported: PNG, JPEG, GIF, WebP</small>
        </div>
        
        <div class="form-group hidden" id="url-section">
            <label for="image-url">Image URL</label>
            <nui-input>
                <input type="url" id="image-url" name="image-url" placeholder="https://example.com/image.jpg">
            </nui-input>
            <small class="text-dim">The gateway will fetch and process the image</small>
        </div>
        
        <div class="form-group">
            <label for="detail">Detail Level</label>
            <nui-select>
                <select id="detail" name="detail">
                    <option value="" selected>Default (adapter decides)</option>
                    <option value="low">Low (512x512, faster)</option>
                    <option value="high">High (up to 2048x2048)</option>
                </select>
            </nui-select>
            <small class="text-dim">Some adapters don't support detail parameter - use "Default" for compatibility</small>
        </div>
        
        <div class="form-group">
            <label for="prompt">Prompt</label>
            <nui-textarea>
                <textarea id="prompt" name="prompt" rows="3" placeholder="Describe what you see in this image, or ask a question about it...">What do you see in this image?</textarea>
            </nui-textarea>
        </div>
        
        <nui-button-container>
            <nui-button type="primary">
                <button type="submit">Send Vision Request</button>
            </nui-button>
        </nui-button-container>
    </form>
    
    <div class="preview-panel" id="preview-panel" hidden>
        <h4>Image Preview</h4>
        <img id="image-preview" class="image-preview" alt="Preview">
    </div>
    
    <div class="response-panel" id="response-panel" hidden>
        <h4>Response</h4>
        <pre class="response-content" id="response-content"></pre>
    </div>
</section>

<script type="nui/page">
function init(element, params) {
    const form = element.querySelector('#vision-form');
    const modelSelect = element.querySelector('#model');
    const fileInput = element.querySelector('#image-file');
    const fileSelectBtn = element.querySelector('#file-select-btn');
    const fileName = element.querySelector('#file-name');
    const imageUrl = element.querySelector('#image-url');
    const previewPanel = element.querySelector('#preview-panel');
    const imagePreview = element.querySelector('#image-preview');
    const responsePanel = element.querySelector('#response-panel');
    const responseContent = element.querySelector('#response-content');
    const tabUpload = element.querySelector('#tab-upload');
    const tabUrl = element.querySelector('#tab-url');
    const uploadSection = element.querySelector('#upload-section');
    const urlSection = element.querySelector('#url-section');

    function isVisionCapable(model) {
        return !!model?.capabilities?.vision;
    }
    
    let currentImageData = null;
    let useUrlMode = false;
    
    // Tab switching
    tabUpload.addEventListener('click', () => {
        useUrlMode = false;
        tabUpload.classList.add('tab-active');
        tabUrl.classList.remove('tab-active');
        uploadSection.classList.remove('hidden');
        urlSection.classList.add('hidden');
        imageUrl.value = '';
    });
    
    tabUrl.addEventListener('click', () => {
        useUrlMode = true;
        tabUrl.classList.add('tab-active');
        tabUpload.classList.remove('tab-active');
        urlSection.classList.remove('hidden');
        uploadSection.classList.add('hidden');
        fileInput.value = '';
        fileName.textContent = 'No file selected';
        currentImageData = null;
        previewPanel.hidden = true;
    });
    
    fileSelectBtn.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) {
            fileName.textContent = 'No file selected';
            currentImageData = null;
            previewPanel.hidden = true;
            return;
        }
        
        if (file.size > 20 * 1024 * 1024) {
            alert('File too large. Max 20MB.');
            fileInput.value = '';
            return;
        }
        
        fileName.textContent = file.name;
        
        try {
            const base64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
            
            currentImageData = base64;
            imagePreview.src = base64;
            previewPanel.hidden = false;
        } catch (err) {
            console.error('Failed to read file:', err);
            alert('Failed to read image file');
        }
    });
    
    imageUrl.addEventListener('change', () => {
        const url = imageUrl.value.trim();
        if (url) {
            imagePreview.src = url;
            previewPanel.hidden = false;
        } else {
            previewPanel.hidden = true;
        }
        currentImageData = null;
        fileInput.value = '';
        fileName.textContent = 'No file selected';
    });
    
    // Populate models when loaded
    function updateModels() {
        const state = window.modelsService?.getState?.();
        const currentModel = modelSelect.value;
        
        modelSelect.innerHTML = '';
        
        const visionModels = (state?.models || []).filter(isVisionCapable);

        if (!state || visionModels.length === 0) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = state ? 'No vision-capable models' : 'Loading models...';
            option.disabled = true;
            modelSelect.appendChild(option);
            modelSelect.disabled = true;
        } else {
            modelSelect.disabled = false;
            
            // Add auto option
            const autoOption = document.createElement('option');
            autoOption.value = '';
            autoOption.textContent = 'Auto-select';
            modelSelect.appendChild(autoOption);
            
            // Group by adapter
            const byAdapter = new Map();
            for (const model of visionModels) {
                const adapter = model.owned_by || model.provider || 'unknown';
                if (!byAdapter.has(adapter)) byAdapter.set(adapter, []);
                byAdapter.get(adapter).push(model);
            }
            
            for (const [adapter, models] of byAdapter) {
                const group = document.createElement('optgroup');
                group.label = adapter.charAt(0).toUpperCase() + adapter.slice(1);
                
                for (const model of models) {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.id;
                    group.appendChild(option);
                }
                
                modelSelect.appendChild(group);
            }
            
            if (currentModel && visionModels.map(m => m.id).includes(currentModel)) {
                modelSelect.value = currentModel;
            }
        }
        
        modelSelect.closest('nui-select')?.refresh?.();
        updateVisionWarning();
    }
    
    function updateVisionWarning() {
        const selectedModel = modelSelect.value;
        const existingWarning = form.querySelector('.vision-warning');
        if (existingWarning) existingWarning.remove();
        
        if (!selectedModel) return;
        
        const state = window.modelsService?.getState?.();
        const model = state?.models?.find(m => m.id === selectedModel);
        
        if (model && !model.capabilities?.vision) {
            const warning = document.createElement('div');
            warning.className = 'vision-warning form-group';
            warning.innerHTML = `
                <nui-banner priority="warning">
                    <span>⚠️ ${selectedModel} may not support vision. Results may vary.</span>
                </nui-banner>
            `;
            form.insertBefore(warning, form.querySelector('nui-button-container'));
        }
    }
    
    modelSelect.addEventListener('change', updateVisionWarning);
    
    const unsubscribe = window.modelsService?.subscribe?.((state) => {
        updateModels();
    });
    
    updateModels();
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(form);
        const model = formData.get('model') || undefined;
        const prompt = formData.get('prompt');
        const detail = formData.get('detail') || undefined;
        
        responsePanel.hidden = false;
        responseContent.textContent = 'Sending request...';
        
        try {
            let imageContent;
            
            if (useUrlMode) {
                const url = imageUrl.value.trim();
                if (!url) {
                    alert('Please enter an image URL');
                    return;
                }
                imageContent = { type: 'image_url', image_url: { url, detail } };
            } else {
                if (!currentImageData) {
                    alert('Please select an image file');
                    return;
                }
                imageContent = { type: 'image_url', image_url: { url: currentImageData, detail } };
            }
            
            const gatewayUrl = window.location.origin.replace(':3401', ':3400');
            const request = {
                model,
                messages: [
                    {
                        role: 'user',
                        content: [
                            { type: 'text', text: prompt },
                            imageContent
                        ]
                    }
                ]
            };
            
            const response = await fetch(`${gatewayUrl}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(request)
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                throw new Error(data.error?.message || `HTTP ${response.status}`);
            }
            
            responseContent.textContent = data.choices?.[0]?.message?.content || 'No response content';
            
        } catch (error) {
            responseContent.textContent = `Error: ${error.message}`;
        }
    });
    
    element.hide = () => {
        if (unsubscribe) unsubscribe();
    };
}
</script>
