<section class="test-form">
    <header>
        <h2>Test Audio Speech (Live)</h2>
        <p class="text-dim">Generate speech audio through WebAdmin proxy and play the result in-browser</p>
    </header>

    <form id="audio-form">
        <div class="form-group">
            <label for="provider">Provider</label>
            <nui-select>
                <select id="provider" name="provider">
                    <option value="">Auto-select</option>
                </select>
            </nui-select>
        </div>

        <div class="form-group">
            <label for="model">Model</label>
            <nui-select>
                <select id="model" name="model">
                    <option value="">Auto-select model</option>
                </select>
            </nui-select>
        </div>

        <div class="form-group form-grid-2">
            <div>
                <label for="voice">Voice</label>
                <nui-select>
                    <select id="voice" name="voice">
                        <option value="alloy">alloy (Default)</option>
                        <option value="echo">echo</option>
                        <option value="fable">fable</option>
                        <option value="onyx">onyx</option>
                        <option value="nova">nova</option>
                        <option value="shimmer">shimmer</option>
                    </select>
                </nui-select>
            </div>
            <div>
                <label for="response_format">Format</label>
                <nui-select>
                    <select id="response_format" name="response_format">
                        <option value="mp3">mp3</option>
                        <option value="wav">wav</option>
                        <option value="opus">opus</option>
                    </select>
                </nui-select>
            </div>
        </div>

        <div class="form-group">
            <label for="input">Speech Input</label>
            <nui-textarea>
                <textarea id="input" name="input" rows="4" placeholder="Welcome to LLM Gateway WebAdmin live audio test."></textarea>
            </nui-textarea>
        </div>

        <nui-button-container>
            <nui-button type="primary">
                <button type="submit">Generate Audio</button>
            </nui-button>
        </nui-button-container>
    </form>

    <div class="response-panel" id="audio-result-panel" hidden>
        <h4>Audio Output</h4>
        <audio id="audio-player" controls class="audio-player"></audio>
        <div class="audio-meta" id="audio-meta"></div>
        <a id="download-link" href="#" download hidden>Download Audio</a>
    </div>

    <div class="response-panel" id="audio-raw-panel" hidden>
        <h4>Request Status</h4>
        <pre class="response-content" id="audio-raw"></pre>
    </div>
</section>

<script type="nui/page">
function init(element) {
    const form = element.querySelector('#audio-form');
    const providerSelect = element.querySelector('#provider');
    const modelSelect = element.querySelector('#model');
    const resultPanel = element.querySelector('#audio-result-panel');
    const rawPanel = element.querySelector('#audio-raw-panel');
    const audioRaw = element.querySelector('#audio-raw');
    const audioPlayer = element.querySelector('#audio-player');
    const audioMeta = element.querySelector('#audio-meta');
    const downloadLink = element.querySelector('#download-link');

    let currentObjectUrl = null;
    let providerCapabilities = {};

    function isTtsCapableModel(model) {
        return !!model?.capabilities?.tts;
    }

    function isTtsCapableProvider(provider) {
        const providerCaps = providerCapabilities?.[provider]?.capabilities || {};
        return providerCaps.tts === true;
    }

    async function loadProviderCapabilities() {
        try {
            const response = await fetch('/api/config');
            if (!response.ok) return;
            const config = await response.json();
            providerCapabilities = config.providers || {};
        } catch {
            providerCapabilities = {};
        }
    }

    function cleanupAudioUrl() {
        if (currentObjectUrl) {
            URL.revokeObjectURL(currentObjectUrl);
            currentObjectUrl = null;
        }
    }

    function updateProviders() {
        const state = window.modelsService?.getState?.();
        const currentProvider = providerSelect.value;

        providerSelect.innerHTML = '<option value="">Auto-select</option>';

        const modelProviders = state?.providers || [];
        const configuredProviders = Object.keys(providerCapabilities || {});
        const allProviders = Array.from(new Set([...modelProviders, ...configuredProviders]));
        const eligibleProviders = allProviders.filter(provider => {
            const models = window.modelsService?.getModelsForProvider?.(provider) || [];
            const hasModelSupport = models.some(isTtsCapableModel);
            return hasModelSupport || isTtsCapableProvider(provider);
        });

        if (!state || eligibleProviders.length === 0) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = state ? 'No TTS-capable providers' : 'Loading providers...';
            option.disabled = true;
            providerSelect.appendChild(option);
            providerSelect.disabled = true;
        } else {
            providerSelect.disabled = false;
            for (const provider of eligibleProviders) {
                const option = document.createElement('option');
                option.value = provider;
                option.textContent = provider;
                providerSelect.appendChild(option);
            }
            if (currentProvider && eligibleProviders.includes(currentProvider)) {
                providerSelect.value = currentProvider;
            }
        }

        providerSelect.closest('nui-select')?.refresh?.();
        updateModels();
    }

    function updateModels() {
        const provider = providerSelect.value;
        const currentModel = modelSelect.value;

        modelSelect.innerHTML = '';

        const autoOption = document.createElement('option');
        autoOption.value = '';
        autoOption.textContent = 'Auto-select model';
        modelSelect.appendChild(autoOption);

        if (!provider) {
            modelSelect.disabled = true;
            modelSelect.closest('nui-select')?.refresh?.();
            return;
        }

        modelSelect.disabled = false;

        const allModels = window.modelsService?.getModelsForProvider?.(provider) || [];
        const models = allModels.filter(isTtsCapableModel);

        for (const model of models) {
            const option = document.createElement('option');
            option.value = model.id;
            option.textContent = model.id;
            modelSelect.appendChild(option);
        }

        if (models.length === 0) {
            if (isTtsCapableProvider(provider)) {
                autoOption.textContent = 'Use provider default TTS model';
            } else {
                const noneOption = document.createElement('option');
                noneOption.value = '';
                noneOption.textContent = 'No TTS-capable models found';
                noneOption.disabled = true;
                modelSelect.appendChild(noneOption);
            }
        }

        const modelIds = models.map(m => m.id);
        if (currentModel && modelIds.includes(currentModel)) {
            modelSelect.value = currentModel;
        }

        modelSelect.closest('nui-select')?.refresh?.();
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        cleanupAudioUrl();

        rawPanel.hidden = false;
        resultPanel.hidden = true;
        audioRaw.textContent = 'Submitting...';

        const formData = new FormData(form);
        const payload = {
            provider: formData.get('provider') || undefined,
            model: formData.get('model') || undefined,
            input: formData.get('input'),
            voice: formData.get('voice'),
            response_format: formData.get('response_format')
        };

        try {
            const response = await fetch('/api/proxy/audio/speech', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                let errText = `${response.status} ${response.statusText}`;
                try {
                    errText = await response.text();
                } catch {}
                audioRaw.textContent = `Error: ${errText}`;
                return;
            }

            const blob = await response.blob();
            currentObjectUrl = URL.createObjectURL(blob);

            resultPanel.hidden = false;
            audioPlayer.src = currentObjectUrl;
            audioMeta.textContent = `Content-Type: ${blob.type || 'audio/*'} | Size: ${blob.size.toLocaleString()} bytes`;

            const ext = (payload.response_format || 'mp3').toLowerCase();
            downloadLink.hidden = false;
            downloadLink.href = currentObjectUrl;
            downloadLink.download = `tts-output.${ext}`;

            audioRaw.textContent = JSON.stringify({
                status: response.status,
                content_type: blob.type || null,
                size_bytes: blob.size
            }, null, 2);
        } catch (error) {
            audioRaw.textContent = `Error: ${error.message}`;
        }
    });

    providerSelect.addEventListener('change', updateModels);

    const unsubscribe = window.modelsService?.subscribe?.(() => updateProviders());
    loadProviderCapabilities().finally(() => updateProviders());

    element.hide = () => {
        cleanupAudioUrl();
        if (unsubscribe) unsubscribe();
    };
}
</script>

<style>
.form-grid-2 {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--nui-space);
}
.audio-player {
    width: 100%;
    margin-bottom: var(--nui-space-half);
}
.audio-meta {
    font-size: 0.875rem;
    color: var(--nui-fg-dim);
    margin-bottom: var(--nui-space-half);
}
</style>
