<section class="test-form">
    <header>
        <h2>Test Chat Completion</h2>
        <p class="text-dim">Send a chat completion request through the gateway</p>
    </header>
    
    <form id="chat-form">
        <div class="form-group">
            <label for="model">Model</label>
            <nui-select id="model-select">
                <select id="model" name="model">
                    <option value="">Loading models...</option>
                </select>
            </nui-select>
        </div>
        
        <div class="form-group">
            <nui-checkbox>
                <input type="checkbox" id="stream" name="stream" checked>
                <label for="stream">Enable streaming</label>
            </nui-checkbox>
        </div>
        
        <div class="form-group">
            <label for="message">Message</label>
            <nui-textarea>
                <textarea id="message" name="message" rows="4" placeholder="Enter your message here..."></textarea>
            </nui-textarea>
        </div>
        
        <nui-button-container>
            <nui-button type="primary">
                <button type="submit">Send Request</button>
            </nui-button>
        </nui-button-container>
    </form>
    
    <div class="response-panel" id="response-panel" hidden>
        <h4>Response</h4>
        <pre class="response-content" id="response-content"></pre>
    </div>
</section>

<script type="nui/page">
function init(element, params) {
    const form = element.querySelector('#chat-form');
    const responsePanel = element.querySelector('#response-panel');
    const responseContent = element.querySelector('#response-content');
    const modelSelect = element.querySelector('#model');

    function isChatCapable(model) {
        return model?.capabilities?.chat !== false;
    }
    
    // Populate models when loaded
    function updateModels() {
        const state = window.modelsService?.getState?.();
        console.log('[TestChat] updateModels called, state:', state);
        
        const currentModel = modelSelect.value;
        
        // Clear and rebuild
        modelSelect.innerHTML = '';
        
        const chatModels = (state?.models || []).filter(isChatCapable);

        if (!state || chatModels.length === 0) {
            console.log('[TestChat] No models yet, showing loading state');
            const option = document.createElement('option');
            option.value = '';
            option.textContent = state ? 'No chat-capable models' : 'Loading models...';
            option.disabled = true;
            modelSelect.appendChild(option);
            modelSelect.disabled = true;
        } else {
            modelSelect.disabled = false;
            
            // Add auto option
            const autoOption = document.createElement('option');
            autoOption.value = '';
            autoOption.textContent = `Auto-select (default: ${state.models.find(m => m.id)?.id || 'none'})`;
            modelSelect.appendChild(autoOption);
            
            // Group by adapter for better organization
            const byAdapter = new Map();
            for (const model of chatModels) {
                const adapter = model.owned_by || model.provider || 'unknown';
                if (!byAdapter.has(adapter)) byAdapter.set(adapter, []);
                byAdapter.get(adapter).push(model);
            }
            
            for (const [adapter, models] of byAdapter) {
                const group = document.createElement('optgroup');
                group.label = adapter.charAt(0).toUpperCase() + adapter.slice(1);
                
                for (const model of models) {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.id;
                    group.appendChild(option);
                }
                
                modelSelect.appendChild(group);
            }
            
            // Restore selection if still valid
            const modelIds = chatModels.map(m => m.id);
            if (currentModel && modelIds.includes(currentModel)) {
                modelSelect.value = currentModel;
            }
        }
        
        // Refresh nui-select to reflect changes
        const nuiSelect = modelSelect.closest('nui-select');
        if (nuiSelect && typeof nuiSelect.refresh === 'function') {
            nuiSelect.refresh();
        }
    }
    
    // Subscribe to model updates
    const unsubscribe = window.modelsService?.subscribe?.((state) => {
        updateModels();
    });
    
    // Initial population
    updateModels();
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(form);
        const request = {
            model: formData.get('model') || undefined,
            stream: formData.has('stream'),
            messages: [
                { role: 'user', content: formData.get('message') }
            ]
        };
        
        responsePanel.hidden = false;
        responseContent.textContent = 'Sending request...';
        
        try {
            // Call gateway directly (CORS is enabled)
            const gatewayUrl = window.location.origin.replace(':3401', ':3400');
            
            const response = await fetch(`${gatewayUrl}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(request)
            });
            
            // Handle streaming response
            const contentType = response.headers.get('content-type');
            if (contentType?.includes('text/event-stream')) {
                responseContent.textContent = '';
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices?.[0]?.delta?.content || '';
                                responseContent.textContent += content;
                            } catch {
                                // Ignore parse errors for partial chunks
                            }
                        }
                    }
                }
            } else {
                const data = await response.json();
                responseContent.textContent = JSON.stringify(data, null, 2);
            }
            
        } catch (error) {
            responseContent.textContent = `Error: ${error.message}`;
        }
    });
    
    // Cleanup
    element.hide = () => {
        if (unsubscribe) unsubscribe();
    };
}
</script>
