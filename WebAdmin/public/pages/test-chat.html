<section class="test-form">
    <header>
        <h2>Test Chat Completion</h2>
        <p class="text-dim">Send a chat completion request through the gateway</p>
    </header>
    
    <form id="chat-form">
        <div class="form-group">
            <label for="provider">Provider</label>
            <nui-select id="provider-select">
                <select id="provider" name="provider">
                    <option value="">Auto-select</option>
                </select>
            </nui-select>
        </div>
        
        <div class="form-group">
            <label for="model">Model</label>
            <nui-select id="model-select">
                <select id="model" name="model">
                    <option value="">Select provider first</option>
                </select>
            </nui-select>
        </div>
        
        <div class="form-group">
            <nui-checkbox>
                <input type="checkbox" id="stream" name="stream" checked>
                <label for="stream">Enable streaming</label>
            </nui-checkbox>
        </div>
        
        <div class="form-group">
            <label for="message">Message</label>
            <nui-textarea>
                <textarea id="message" name="message" rows="4" placeholder="Enter your message here..."></textarea>
            </nui-textarea>
        </div>
        
        <nui-button-container>
            <nui-button type="primary">
                <button type="submit">Send Request</button>
            </nui-button>
        </nui-button-container>
    </form>
    
    <div class="response-panel" id="response-panel" hidden>
        <h4>Response</h4>
        <pre class="response-content" id="response-content"></pre>
    </div>
</section>

<script type="nui/page">
function init(element, params) {
    const form = element.querySelector('#chat-form');
    const responsePanel = element.querySelector('#response-panel');
    const responseContent = element.querySelector('#response-content');
    const providerSelect = element.querySelector('#provider');
    const modelSelect = element.querySelector('#model');

    function isChatCapableModel(model) {
        return model?.capabilities?.chat !== false;
    }
    
    // Populate providers when models are loaded
    function updateProviders() {
        const state = window.modelsService?.getState?.();
        console.log('[TestChat] updateProviders called, state:', state);
        
        // Save current selection before rebuilding
        const currentProvider = providerSelect.value;
        
        // Clear and rebuild
        providerSelect.innerHTML = '<option value="">Auto-select</option>';
        
        const eligibleProviders = (state?.providers || []).filter(provider => {
            const models = window.modelsService?.getModelsForProvider?.(provider) || [];
            return models.some(isChatCapableModel);
        });

        if (!state || eligibleProviders.length === 0) {
            console.log('[TestChat] No providers yet, showing loading state');
            const loadingOption = document.createElement('option');
            loadingOption.value = '';
            loadingOption.textContent = state ? 'No chat-capable providers' : 'Loading providers...';
            loadingOption.disabled = true;
            providerSelect.appendChild(loadingOption);
            providerSelect.disabled = true;
        } else {
            providerSelect.disabled = false;
            
            for (const provider of eligibleProviders) {
                const option = document.createElement('option');
                option.value = provider;
                option.textContent = provider.charAt(0).toUpperCase() + provider.slice(1);
                providerSelect.appendChild(option);
            }
            
            // Restore selection if still valid
            if (currentProvider && eligibleProviders.includes(currentProvider)) {
                providerSelect.value = currentProvider;
            }
        }
        
        // Refresh nui-select to reflect changes
        const nuiSelect = providerSelect.closest('nui-select');
        console.log('[TestChat] Refreshing provider nui-select:', nuiSelect);
        if (nuiSelect && typeof nuiSelect.refresh === 'function') {
            nuiSelect.refresh();
            console.log('[TestChat] Provider refresh called');
        }
        
        // Trigger model update
        updateModels();
    }
    
    // Update models based on selected provider
    function updateModels() {
        const provider = providerSelect.value;
        const currentModel = modelSelect.value;
        
        modelSelect.innerHTML = '';
        
        if (!provider) {
            modelSelect.innerHTML = '<option value="">Auto-selected by gateway</option>';
            modelSelect.disabled = true;
            modelSelect.closest('nui-select')?.refresh();
            return;
        }
        
        modelSelect.disabled = false;
        
        // Add empty option for auto
        const autoOption = document.createElement('option');
        autoOption.value = '';
        autoOption.textContent = 'Auto-select model';
        modelSelect.appendChild(autoOption);
        
        // Get chat-capable models for provider (filter out embedding-only models)
        const allModels = window.modelsService?.getModelsForProvider?.(provider) || [];
        const models = allModels.filter(isChatCapableModel);
        
        for (const model of models) {
            const option = document.createElement('option');
            option.value = model.id;
            option.textContent = model.id;
            modelSelect.appendChild(option);
        }
        
        // Restore selection if still valid
        const modelIds = models.map(m => m.id);
        if (currentModel && modelIds.includes(currentModel)) {
            modelSelect.value = currentModel;
        }
        
        // Refresh nui-select to reflect changes
        const modelNuiSelect = modelSelect.closest('nui-select');
        console.log('[TestChat] Refreshing model nui-select:', modelNuiSelect);
        if (modelNuiSelect && typeof modelNuiSelect.refresh === 'function') {
            modelNuiSelect.refresh();
            console.log('[TestChat] Model refresh called, options:', modelSelect.innerHTML);
        }
    }
    
    // Subscribe to model updates
    const unsubscribe = window.modelsService?.subscribe?.((state) => {
        updateProviders();
    });
    
    // Initial population
    updateProviders();
    
    // Handle provider change
    providerSelect.addEventListener('change', updateModels);
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(form);
        const request = {
            model: formData.get('model') || undefined,
            provider: formData.get('provider') || undefined,
            stream: formData.has('stream'),
            messages: [
                { role: 'user', content: formData.get('message') }
            ]
        };
        
        responsePanel.hidden = false;
        responseContent.textContent = 'Sending request...';
        
        try {
            // Call gateway directly (CORS is enabled)
            const gatewayUrl = window.location.origin.replace(':3401', ':3400');
            const headers = { 'Content-Type': 'application/json' };
            if (request.provider) {
                headers['x-provider'] = request.provider;
            }
            
            const response = await fetch(`${gatewayUrl}/v1/chat/completions`, {
                method: 'POST',
                headers,
                body: JSON.stringify(request)
            });
            
            // Handle streaming response
            const contentType = response.headers.get('content-type');
            if (contentType?.includes('text/event-stream')) {
                responseContent.textContent = '';
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices?.[0]?.delta?.content || '';
                                responseContent.textContent += content;
                            } catch {
                                // Ignore parse errors for partial chunks
                            }
                        }
                    }
                }
            } else {
                const data = await response.json();
                responseContent.textContent = JSON.stringify(data, null, 2);
            }
            
        } catch (error) {
            responseContent.textContent = `Error: ${error.message}`;
        }
    });
    
    // Cleanup
    element.hide = () => {
        if (unsubscribe) unsubscribe();
    };
}
</script>
