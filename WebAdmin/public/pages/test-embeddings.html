<section class="test-form">
    <header>
        <h2>Test Embeddings</h2>
        <p class="text-dim">Generate embeddings for text through the gateway</p>
    </header>
    
    <form id="embeddings-form">
        <div class="form-group">
            <label for="model">Model</label>
            <nui-select id="model-select">
                <select id="model" name="model">
                    <option value="">Loading models...</option>
                </select>
            </nui-select>
        </div>
        
        <div class="form-group">
            <label for="text">Text</label>
            <nui-textarea>
                <textarea id="text" name="text" rows="4" placeholder="Enter text to embed..."></textarea>
            </nui-textarea>
        </div>
        
        <nui-button-container>
            <nui-button type="primary">
                <button type="submit">Generate Embedding</button>
            </nui-button>
        </nui-button-container>
    </form>
    
    <div class="response-panel" id="response-panel" hidden>
        <h4>Result</h4>
        <div class="response-content" id="response-content"></div>
    </div>
</section>

<script type="nui/page">
function init(element, params) {
    const form = element.querySelector('#embeddings-form');
    const responsePanel = element.querySelector('#response-panel');
    const responseContent = element.querySelector('#response-content');
    const modelSelect = element.querySelector('#model');

    function isEmbeddingCapable(model) {
        return !!model?.capabilities?.embeddings;
    }
    
    // Populate models when loaded
    function updateModels() {
        const state = window.modelsService?.getState?.();
        const currentModel = modelSelect.value;
        
        // Clear and rebuild
        modelSelect.innerHTML = '';
        
        const embedModels = (state?.models || []).filter(isEmbeddingCapable);

        if (!state || embedModels.length === 0) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = state ? 'No embedding-capable models' : 'Loading models...';
            option.disabled = true;
            modelSelect.appendChild(option);
            modelSelect.disabled = true;
        } else {
            modelSelect.disabled = false;
            
            // Add auto option
            const autoOption = document.createElement('option');
            autoOption.value = '';
            autoOption.textContent = 'Auto-select';
            modelSelect.appendChild(autoOption);
            
            // Group by adapter
            const byAdapter = new Map();
            for (const model of embedModels) {
                const adapter = model.owned_by || model.provider || 'unknown';
                if (!byAdapter.has(adapter)) byAdapter.set(adapter, []);
                byAdapter.get(adapter).push(model);
            }
            
            for (const [adapter, models] of byAdapter) {
                const group = document.createElement('optgroup');
                group.label = adapter.charAt(0).toUpperCase() + adapter.slice(1);
                
                for (const model of models) {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.id;
                    group.appendChild(option);
                }
                
                modelSelect.appendChild(group);
            }
            
            if (currentModel && embedModels.map(m => m.id).includes(currentModel)) {
                modelSelect.value = currentModel;
            }
        }
        
        modelSelect.closest('nui-select')?.refresh();
    }
    
    const unsubscribe = window.modelsService?.subscribe?.((state) => {
        updateModels();
    });
    
    updateModels();
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(form);
        const request = {
            model: formData.get('model') || undefined,
            input: formData.get('text')
        };
        
        responsePanel.hidden = false;
        responseContent.textContent = 'Generating embedding...';
        
        try {
            const gatewayUrl = window.location.origin.replace(':3401', ':3400');
            
            const response = await fetch(`${gatewayUrl}/v1/embeddings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(request)
            });
            
            const data = await response.json();
            
            if (data.data && data.data[0] && data.data[0].embedding) {
                const embedding = data.data[0].embedding;
                const dimensions = embedding.length;
                const preview = embedding.slice(0, 5).map(n => n.toFixed(6)).join(', ');
                
                responseContent.innerHTML = `
                    <strong>Dimensions:</strong> ${dimensions}<br>
                    <strong>Preview:</strong> [${preview}, ...]<br><br>
                    <details>
                        <summary>Full Response</summary>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </details>
                `;
            } else {
                responseContent.textContent = JSON.stringify(data, null, 2);
            }
            
        } catch (error) {
            responseContent.textContent = `Error: ${error.message}`;
        }
    });
    
    element.hide = () => {
        if (unsubscribe) unsubscribe();
    };
}
</script>
