<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>LLM Gateway Admin</title>
    
    <!-- Polyfill for crypto.randomUUID in non-secure contexts -->
    <script>
        if (!crypto.randomUUID) {
            crypto.randomUUID = function() {
                return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
                    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
                );
            };
        }
    </script>
    
    <!-- NUI Theme -->
    <link rel="stylesheet" href="/NUI/css/nui-theme.css">
    <link rel="stylesheet" href="/NUI/css/modules/nui-list.css">
    <link rel="stylesheet" href="/NUI/css/modules/nui-syntax-highlight.css">
    
    <!-- App Styles -->
    <link rel="stylesheet" href="/css/styles.css">
    
    <style>
        /* Prevent layout shifts by hiding app until upgraded and ready */
        body { margin: 0; padding: 0; overflow: hidden; }
        nui-app:not(.nui-ready) { display: none; }
        nui-loading:not(.active) { display: none; }
    </style>
</head>
<body>
    <!-- Loading indicator -->
    <nui-loading mode="bar">
        <div class="loading-bar">
            <div class="loading-bar-progress"></div>
        </div>
    </nui-loading>
    
    <!-- App Shell -->
    <nui-app nui-vars-sidebar_width="15rem" nui-vars-sidebar_force-breakpoint="75rem">
        <nui-skip-links></nui-skip-links>
        
        <!-- App Header -->
        <nui-app-header>
            <div slot="left">
                <nui-button data-action="toggle-sidebar">
                    <button type="button" aria-label="Toggle navigation menu">
                        <nui-icon name="menu"></nui-icon>
                    </button>
                </nui-button>
                <h1>LLM Gateway Admin</h1>
            </div>
            <div slot="center">
                <!-- Empty center slot -->
            </div>
            <div slot="right">
                <nui-button data-action="toggle-theme">
                    <button type="button" aria-label="Toggle light/dark theme">
                        <nui-icon name="brightness"></nui-icon>
                    </button>
                </nui-button>
            </div>
        </nui-app-header>
        
        <!-- Side Navigation -->
        <nui-sidebar position="left">
            <nui-link-list mode="fold" id="main-nav"></nui-link-list>
        </nui-sidebar>
        
        <!-- Main Content Area -->
        <nui-content>
            <nui-main id="main-content">
                <!-- Content loads here via router -->
            </nui-main>
        </nui-content>
        
        <!-- Footer -->
        <nui-app-footer>
            <span>LLM Gateway Admin v2.0</span>
            <nui-button data-action="scroll-to-top" id="scrollToTop">
                <button type="button" aria-label="Scroll to top">
                    <nui-icon name="arrow" class="scroll-top-icon"></nui-icon>
                </button>
            </nui-button>
        </nui-app-footer>
    </nui-app>
    
    <!-- Scripts -->
    <script type="module" src="/js/main.js"></script>
</body>
</html>
