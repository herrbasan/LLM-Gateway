<section class="test-form">
    <header>
        <h2>Test Video Generation (Live)</h2>
        <p class="text-dim">Run real video generation requests through WebAdmin proxy and poll task completion</p>
    </header>

    <form id="video-form">
        <div class="form-group">
            <label for="model">Model</label>
            <nui-select>
                <select id="model" name="model">
                    <option value="">Loading models...</option>
                </select>
            </nui-select>
        </div>

        <div class="form-group">
            <label for="prompt">Prompt</label>
            <nui-textarea>
                <textarea id="prompt" name="prompt" rows="3" placeholder="A serene landscape with mountains and flowing rivers"></textarea>
            </nui-textarea>
        </div>

        <div class="form-group form-grid-2">
            <div>
                <label for="duration">Duration (seconds)</label>
                <nui-select>
                    <select id="duration" name="duration">
                        <option value="5">5 seconds</option>
                        <option value="10">10 seconds</option>
                        <option value="15">15 seconds</option>
                        <option value="30">30 seconds</option>
                        <option value="60">60 seconds</option>
                    </select>
                </nui-select>
            </div>
            <div>
                <label for="resolution">Resolution</label>
                <nui-select>
                    <select id="resolution" name="resolution">
                        <option value="480p">480p</option>
                        <option value="720p">720p</option>
                        <option value="1080p">1080p</option>
                    </select>
                </nui-select>
            </div>
        </div>

        <div class="form-group">
            <label for="quality">Quality</label>
            <nui-select>
                <select id="quality" name="quality">
                    <option value="standard">standard</option>
                    <option value="high">high</option>
                </select>
            </nui-select>
        </div>

        <nui-button-container>
            <nui-button type="primary">
                <button type="submit">Submit Generation Job</button>
            </nui-button>
        </nui-button-container>
    </form>

    <div class="response-panel" id="ticket-panel" hidden>
        <h4>Ticket Task SSE Listener</h4>
        <div class="ticket-row">
            <code id="ticket-id">-</code>
            <nui-progress id="ticket-busy" type="circular-busy" size="1rem" hidden></nui-progress>
        </div>
        <pre class="response-content" id="ticket-status"></pre>
    </div>

    <div class="response-panel" id="video-result-panel" hidden>
        <h4>Generated Video</h4>
        <div id="video-result"></div>
    </div>
</section>

<script type="nui/page">
function init(element) {
    const form = element.querySelector('#video-form');
    const modelSelect = element.querySelector('#model');
    const ticketPanel = element.querySelector('#ticket-panel');
    const ticketIdEl = element.querySelector('#ticket-id');
    const ticketStatus = element.querySelector('#ticket-status');
    const ticketBusy = element.querySelector('#ticket-busy');
    const resultPanel = element.querySelector('#video-result-panel');
    const resultContainer = element.querySelector('#video-result');

    let activeTicket = null;
    let eventSource = null;

    function setBusy(busy) {
        if (ticketBusy) ticketBusy.hidden = !busy;
    }

    function stopPolling() {
        if (eventSource) {
            eventSource.close();
            eventSource = null;
        }
    }

    function isVideoCapable(model) {
        return model?.type === 'video';
    }

    function showStatus(obj) {
        ticketStatus.textContent = JSON.stringify(obj, null, 2);
    }

    function handleTaskCompletion(data) {
        if (!data) return;
        
        let resultPayload = data.result || data;

        if ((data.status === 'complete' || !data.status) && resultPayload?.data?.length) {
            const item = resultPayload.data[0];
            resultPanel.hidden = false;

            if (item.local_url) {
                const filename = item.local_url.split('/').pop();
                const mediaUrl = `/api/proxy/media/${encodeURIComponent(filename)}`;
                resultContainer.innerHTML = `
                    <p><strong>Staged URL:</strong> ${item.local_url}</p>
                    <video src="${mediaUrl}" controls class="generated-video" style="max-width: 100%; max-height: 400px;"></video>
                `;
            } else if (item.url) {
                resultContainer.innerHTML = `
                    <p><strong>Remote URL:</strong></p>
                    <video src="${item.url}" controls class="generated-video" style="max-width: 100%; max-height: 400px;"></video>
                `;
            } else {
                resultContainer.innerHTML = '<p>No video payload found in response</p>';
            }
        }
    }

    function startSSETicketTracking(ticketId) {
        stopPolling();
        
        eventSource = new EventSource(`/api/tasks/${encodeURIComponent(ticketId)}/stream`);
        
        eventSource.onmessage = (event) => {
            if (event.data === '[DONE]') {
                console.log('[SSE] Stream marked as [DONE]');
                stopPolling();
                return;
            }

            try {
                const data = JSON.parse(event.data);
                showStatus(data);
                
                if (data.status === 'complete' || data.status === 'failed') {
                    setBusy(false);
                    handleTaskCompletion(data);
                }
            } catch (err) {
                console.error('[SSE] Failed to parse message', err);
            }
        };

        eventSource.addEventListener('completion.result', (event) => {
            try {
                const data = JSON.parse(event.data);
                setBusy(false);
                handleTaskCompletion(data);
                stopPolling();
            } catch (err) {
                console.error('[SSE] Failed to parse completion result', err);
            }
        });
        
        eventSource.addEventListener('completion.error', (event) => {
            try {
                const data = JSON.parse(event.data);
                setBusy(false);
                showStatus(data);
                stopPolling();
            } catch (err) {
                console.error('[SSE] Failed to parse completion error', err);
            }
        });

        eventSource.onerror = (error) => {
            if (eventSource && eventSource.readyState === EventSource.CLOSED) {
                console.log('[SSE] Connection cleanly closed');
            } else {
                console.error('[SSE] Task stream error', error);
            }
            stopPolling();
        };
    }

    async function loadConfigModels() {
        try {
            await window.modelsService?.fetchConfigModels?.();
            updateModels();
        } catch (error) {
            console.error('Failed to load config models:', error);
        }
    }

    function updateModels() {
        const currentModel = modelSelect.value;
        const videoModels = window.modelsService?.getModelsByType?.('video') || {};
        const modelEntries = Object.entries(videoModels);

        modelSelect.innerHTML = '';

        if (modelEntries.length === 0) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'No video models configured';
            option.disabled = true;
            modelSelect.appendChild(option);
            modelSelect.disabled = true;
        } else {
            modelSelect.disabled = false;
            
            // Add auto option
            const autoOption = document.createElement('option');
            autoOption.value = '';
            autoOption.textContent = 'Auto-select (default)';
            modelSelect.appendChild(autoOption);
            
            // Group by adapter
            const byAdapter = new Map();
            for (const [modelId, config] of modelEntries) {
                const adapter = config.adapter || 'unknown';
                if (!byAdapter.has(adapter)) byAdapter.set(adapter, []);
                byAdapter.get(adapter).push({ id: modelId, ...config });
            }
            
            for (const [adapter, models] of byAdapter) {
                const group = document.createElement('optgroup');
                group.label = adapter.charAt(0).toUpperCase() + adapter.slice(1);
                
                for (const model of models) {
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.id;
                    group.appendChild(option);
                }
                
                modelSelect.appendChild(group);
            }
            
            if (currentModel && modelEntries.find(([id]) => id === currentModel)) {
                modelSelect.value = currentModel;
            }
        }

        modelSelect.closest('nui-select')?.refresh?.();
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        stopPolling();
        resultPanel.hidden = true;
        resultContainer.innerHTML = '';

        const formData = new FormData(form);
        const payload = {
            model: formData.get('model') || undefined,
            prompt: formData.get('prompt'),
            duration: parseInt(formData.get('duration')),
            resolution: formData.get('resolution'),
            quality: formData.get('quality')
        };

        ticketPanel.hidden = false;
        setBusy(true);
        showStatus({ status: 'submitting' });

        try {
            const response = await fetch('/api/proxy/videos/generations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            showStatus(data);

            if (response.status === 202 && data.ticket) {
                activeTicket = data.ticket;
                ticketIdEl.textContent = data.ticket;
                startSSETicketTracking(data.ticket);
            } else {
                activeTicket = null;
                ticketIdEl.textContent = '-';
            }
        } catch (error) {
            setBusy(false);
            showStatus({ error: error.message });
        }
    });

    const unsubscribe = window.modelsService?.subscribeConfig?.(() => updateModels());
    loadConfigModels();

    element.hide = () => {
        stopPolling();
        if (unsubscribe) unsubscribe();
    };
}
</script>
