version: '3.8'

services:
  llm-gateway:
    build: .
    container_name: llm-gateway
    ports:
      - "3400:3400"
    environment:
      - NODE_ENV=production
      # Map environment variables for the gateway here (used directly via dotenv or substitution in config.json)
      # - OLLAMA_HOST=http://host.docker.internal:11434
      # - GEMINI_API_KEY=your_gemini_api_key
      # - OPENAI_API_KEY=your_openai_api_key
    volumes:
      # Optional: Map your custom config.json if you don't want to bake it into the image
      # - ./config.json:/usr/src/app/config.json
    restart: unless-stopped
